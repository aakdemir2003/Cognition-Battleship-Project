<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#070f19"/>
      <stop offset="45%" stop-color="#142133"/>
      <stop offset="72%" stop-color="#3a3a44"/>
      <stop offset="86%" stop-color="#8a5a32"/>
      <stop offset="100%" stop-color="#d68a3c"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c3147"/>
      <stop offset="100%" stop-color="#070d15"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd9a0" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#f0a44e" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f0a44e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff4d8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#fff4d8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- sky + sea -->
  <rect width="1600" height="620" fill="url(#sky)"/>
  <rect y="600" width="1600" height="300" fill="url(#sea)"/>

  <!-- sun haze on the horizon -->
  <circle cx="1080" cy="600" r="360" fill="url(#sun)"/>
  <circle cx="1080" cy="600" r="70" fill="#ffe6b8" opacity="0.9"/>

  <!-- searchlight beams sweeping the sky -->
  <g opacity="0.8">
    <polygon points="300,640 250,40 320,30 470,640" fill="url(#beam)"/>
    <polygon points="560,640 600,60 660,70 700,640" fill="url(#beam)"/>
    <polygon points="1320,640 1380,90 1440,110 1460,640" fill="url(#beam)"/>
  </g>

  <!-- drifting smoke plumes -->
  <g fill="#9aa3ab" opacity="0.18">
    <ellipse cx="430" cy="430" rx="120" ry="60"/>
    <ellipse cx="500" cy="380" rx="150" ry="80"/>
    <ellipse cx="560" cy="320" rx="120" ry="70"/>
    <ellipse cx="1230" cy="400" rx="140" ry="70"/>
    <ellipse cx="1300" cy="340" rx="120" ry="80"/>
  </g>

  <!-- distant warship silhouettes on the horizon (y around 600) -->
  <g fill="#060d15">
    <!-- left battleship -->
    <g transform="translate(360,560)">
      <rect x="-150" y="36" width="300" height="22"/>
      <path d="M-150,36 L-185,58 L185,58 L150,36 Z"/>
      <rect x="-70" y="14" width="150" height="24"/>
      <rect x="-20" y="-18" width="44" height="34"/>
      <rect x="-6" y="-46" width="12" height="30"/>
      <rect x="-92" y="-30" width="8" height="46"/>
      <rect x="84" y="-22" width="8" height="38"/>
      <!-- gun turrets -->
      <rect x="-120" y="22" width="34" height="16"/>
      <rect x="92" y="22" width="34" height="16"/>
    </g>

    <!-- center destroyer (smaller, farther) -->
    <g transform="translate(820,584) scale(0.7)">
      <rect x="-120" y="30" width="240" height="18"/>
      <path d="M-120,30 L-150,48 L150,48 L120,30 Z"/>
      <rect x="-50" y="10" width="110" height="22"/>
      <rect x="-12" y="-16" width="30" height="28"/>
      <rect x="-3" y="-40" width="8" height="26"/>
    </g>

    <!-- right cruiser -->
    <g transform="translate(1180,566) scale(0.9)">
      <rect x="-140" y="34" width="280" height="20"/>
      <path d="M-140,34 L-172,56 L172,56 L140,34 Z"/>
      <rect x="-60" y="12" width="130" height="24"/>
      <rect x="-16" y="-18" width="38" height="32"/>
      <rect x="-5" y="-44" width="10" height="28"/>
      <rect x="70" y="-24" width="7" height="40"/>
      <rect x="-104" y="20" width="30" height="16"/>
      <rect x="80" y="20" width="30" height="16"/>
    </g>
  </g>

  <!-- water reflections / wave streaks -->
  <g opacity="0.35">
    <line x1="0" y1="660" x2="1600" y2="660" stroke="#2c4763" stroke-width="2"/>
    <line x1="0" y1="710" x2="1600" y2="710" stroke="#21384f" stroke-width="2"/>
    <line x1="0" y1="770" x2="1600" y2="770" stroke="#182a3d" stroke-width="3"/>
    <line x1="0" y1="840" x2="1600" y2="840" stroke="#101e2d" stroke-width="4"/>
  </g>
  <g fill="#ffcf9a" opacity="0.25">
    <rect x="1020" y="640" width="120" height="6" rx="3"/>
    <rect x="1040" y="680" width="80" height="5" rx="2"/>
    <rect x="1055" y="720" width="50" height="4" rx="2"/>
  </g>
</svg>
