<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" role="img" aria-label="Cognition">
  <defs>
    <linearGradient id="cogGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe6a8"/>
      <stop offset="1" stop-color="#f0b44a"/>
    </linearGradient>
  </defs>
  <!-- Emblem: a small connected-node network suggesting cognition -->
  <g fill="none" stroke="url(#cogGold)" stroke-width="2.4" stroke-linecap="round">
    <circle cx="30" cy="30" r="20" stroke-opacity="0.55"/>
    <line x1="22" y1="20" x2="38" y2="40"/>
    <line x1="38" y1="20" x2="22" y2="40"/>
    <line x1="22" y1="30" x2="38" y2="30"/>
  </g>
  <g fill="url(#cogGold)">
    <circle cx="22" cy="20" r="3.4"/>
    <circle cx="38" cy="20" r="3.4"/>
    <circle cx="22" cy="40" r="3.4"/>
    <circle cx="38" cy="40" r="3.4"/>
    <circle cx="30" cy="30" r="3.8"/>
  </g>
  <text x="64" y="38" font-family="'Rajdhani','Segoe UI',system-ui,sans-serif"
        font-size="26" font-weight="700" letter-spacing="3"
        fill="#f4e4c1">COGNITION</text>
</svg>
