<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 20" preserveAspectRatio="none" role="img" aria-label="destroyer">
  <defs>
    <linearGradient id="ds" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b6c4d2"/>
      <stop offset="0.5" stop-color="#93a3b3"/>
      <stop offset="1" stop-color="#5e6f80"/>
    </linearGradient>
  </defs>
  <!-- light slim fast hull, sharp bow -->
  <path d="M5 5 H88 L99 10 L88 15 H5 Q2 10 5 5 Z" fill="url(#ds)" stroke="#41505f" stroke-width="0.8"/>
  <!-- red accent stripe along the deck -->
  <rect x="10" y="9.2" width="78" height="1.8" rx="0.9" fill="#d7392f"/>
  <!-- single funnel + small bridge -->
  <rect x="48" y="6" width="7" height="8" rx="1" fill="#41505f"/>
  <rect x="40" y="7" width="6" height="6" rx="1" fill="#4d5d6d"/>
  <!-- forward gun + red bow tip -->
  <rect x="22" y="8" width="6" height="4" rx="1" fill="#4d5d6d"/>
  <path d="M88 15 L99 10 L88 5 Z" fill="#d7392f" opacity="0.85"/>
</svg>
